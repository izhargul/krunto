<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7143130602873663" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free CV / Resume Builder - Download as PDF | Krunto</title>
<meta name="description" content="Free online CV and resume builder. Fill in your details and download a clean, professional resume as a PDF instantly, no sign-up required.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--bg:#FBFAF6;--ink:#1F2321;--teal:#1F6F5C;--gold:#E8A33D;--card:#F1EFE7;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:28px 6vw;}
  .logo{font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;}
  .back{font-weight:500;font-size:0.9rem;color:var(--teal);}
  main{max-width:680px;margin:0 auto;padding:20px 6vw 100px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:2rem;margin-bottom:8px;}
  .sub{color:#666;margin-bottom:32px;}
  .card{background:var(--card);border-radius:18px;padding:26px;margin-bottom:20px;}
  .card h2{font-family:'Fraunces',serif;font-size:1.1rem;margin:0 0 16px;}
  label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:6px;margin-top:14px;}
  label:first-child{margin-top:0;}
  input,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.95rem;background:#fff;}
  textarea{min-height:80px;resize:vertical;}
  .row2{display:flex;gap:12px;}
  .row2>div{flex:1;}
  .entry{border-top:1px dashed #ccc;padding-top:14px;margin-top:14px;}
  button{background:var(--teal);color:#fff;border:none;padding:10px 20px;border-radius:24px;font-weight:600;font-size:0.85rem;cursor:pointer;margin-top:14px;}
  button.secondary{background:transparent;color:var(--teal);border:1px solid var(--teal);}
  .download{width:100%;padding:16px;font-size:1rem;margin-top:10px;}
  .adspace{margin-top:40px;padding:24px;text-align:center;border:1px dashed #ccc;border-radius:12px;color:#aaa;font-size:0.85rem;}
</style>
</head>
<body>
<header>
  <div class="logo">Krunto</div>
  <a class="back" href="index.html">← All tools</a>
</header>
<main>
  <h1>CV / Resume Builder</h1>
  <p class="sub">Fill in your details and download a clean, professional resume as a PDF — nothing is uploaded, it all happens in your browser.</p>

  <div class="card">
    <h2>Personal details</h2>
    <label>Full name</label><input id="name" placeholder="Jane Doe">
    <div class="row2">
      <div><label>Email</label><input id="email" placeholder="jane@email.com"></div>
      <div><label>Phone</label><input id="phone" placeholder="+1 555 123 4567"></div>
    </div>
    <label>Location</label><input id="location" placeholder="New York, NY">
    <label>Professional summary</label><textarea id="summary" placeholder="A short 2-3 sentence overview of your experience and strengths..."></textarea>
  </div>

  <div class="card">
    <h2>Work experience</h2>
    <div id="expList"></div>
    <button class="secondary" onclick="addExp()">+ Add experience</button>
  </div>

  <div class="card">
    <h2>Education</h2>
    <div id="eduList"></div>
    <button class="secondary" onclick="addEdu()">+ Add education</button>
  </div>

  <div class="card">
    <h2>Skills</h2>
    <label>Comma-separated list</label>
    <input id="skills" placeholder="Project Management, Excel, Communication, Python">
  </div>

  <button class="download" onclick="generatePDF()">Download PDF</button>

  <div class="adspace">Ad space</div>
</main>
<script>
let expCount=0, eduCount=0;
function addExp(){
  expCount++;
  const div=document.createElement('div');
  div.className='entry';
  div.innerHTML=`
    <div class="row2">
      <div><label>Job title</label><input class="exp-title" placeholder="Marketing Manager"></div>
      <div><label>Company</label><input class="exp-company" placeholder="Acme Inc."></div>
    </div>
    <label>Dates</label><input class="exp-dates" placeholder="Jan 2022 – Present">
    <label>Description</label><textarea class="exp-desc" placeholder="What you did and achieved..."></textarea>
  `;
  document.getElementById('expList').appendChild(div);
}
function addEdu(){
  eduCount++;
  const div=document.createElement('div');
  div.className='entry';
  div.innerHTML=`
    <div class="row2">
      <div><label>Degree</label><input class="edu-degree" placeholder="B.A. in Economics"></div>
      <div><label>School</label><input class="edu-school" placeholder="State University"></div>
    </div>
    <label>Year</label><input class="edu-year" placeholder="2021">
  `;
  document.getElementById('eduList').appendChild(div);
}
addExp(); addEdu();

function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt',format:'a4'});
  const margin=50; let y=60;
  const pageWidth=doc.internal.pageSize.getWidth();

  doc.setFont('helvetica','bold'); doc.setFontSize(22);
  doc.text(document.getElementById('name').value||'Your Name', margin, y); y+=22;

  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(90);
  const contact=[document.getElementById('email').value, document.getElementById('phone').value, document.getElementById('location').value].filter(Boolean).join('   |   ');
  doc.text(contact, margin, y); y+=24;
  doc.setTextColor(0);

  const summary=document.getElementById('summary').value;
  if(summary){
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.text('SUMMARY', margin, y); y+=6;
    doc.setDrawColor(200); doc.line(margin, y, pageWidth-margin, y); y+=16;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    const lines=doc.splitTextToSize(summary, pageWidth-margin*2);
    doc.text(lines, margin, y); y+=lines.length*13+16;
  }

  const expTitles=document.querySelectorAll('.exp-title');
  if(expTitles.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.text('EXPERIENCE', margin, y); y+=6;
    doc.line(margin, y, pageWidth-margin, y); y+=16;
    expTitles.forEach((el,i)=>{
      const title=el.value, company=document.querySelectorAll('.exp-company')[i].value;
      const dates=document.querySelectorAll('.exp-dates')[i].value, desc=document.querySelectorAll('.exp-desc')[i].value;
      if(!title && !company) return;
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(`${title}${company?' — '+company:''}`, margin, y); y+=13;
      doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(120); doc.text(dates, margin, y); doc.setTextColor(0); y+=13;
      doc.setFont('helvetica','normal'); doc.setFontSize(10);
      const dl=doc.splitTextToSize(desc, pageWidth-margin*2);
      doc.text(dl, margin, y); y+=dl.length*13+12;
    });
    y+=6;
  }

  const eduDegrees=document.querySelectorAll('.edu-degree');
  if(eduDegrees.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.text('EDUCATION', margin, y); y+=6;
    doc.line(margin, y, pageWidth-margin, y); y+=16;
    eduDegrees.forEach((el,i)=>{
      const degree=el.value, school=document.querySelectorAll('.edu-school')[i].value, year=document.querySelectorAll('.edu-year')[i].value;
      if(!degree && !school) return;
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(`${degree}${school?' — '+school:''}`, margin, y); y+=13;
      doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(120); doc.text(year, margin, y); doc.setTextColor(0); y+=18;
    });
  }

  const skills=document.getElementById('skills').value;
  if(skills){
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.text('SKILLS', margin, y); y+=6;
    doc.line(margin, y, pageWidth-margin, y); y+=16;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    const sl=doc.splitTextToSize(skills, pageWidth-margin*2);
    doc.text(sl, margin, y);
  }

  doc.save((document.getElementById('name').value||'resume').replace(/\s+/g,'_')+'_resume.pdf');
}
</script>
</body>
</html>
