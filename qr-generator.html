<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free QR Code Generator - Create & Download QR Codes | Krunto</title>
<meta name="description" content="Free QR code generator. Turn any link, text, or message into a downloadable QR code instantly, no sign-up required.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--bg:#FBFAF6;--ink:#1F2321;--teal:#1F6F5C;--gold:#E8A33D;--card:#F1EFE7;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:28px 6vw;}
  .logo{font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;}
  .back{font-weight:500;font-size:0.9rem;color:var(--teal);}
  main{max-width:560px;margin:0 auto;padding:20px 6vw 100px;text-align:center;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:2rem;margin-bottom:8px;}
  .sub{color:#666;margin-bottom:36px;}
  textarea{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;font-family:'Inter',sans-serif;font-size:1rem;resize:vertical;min-height:90px;background:#fff;}
  select{padding:10px 14px;border-radius:10px;border:1px solid #ddd;font-family:'Inter',sans-serif;margin-top:16px;}
  .qrbox{background:var(--card);border-radius:20px;padding:32px;margin-top:28px;display:flex;flex-direction:column;align-items:center;}
  #qrcode{background:#fff;padding:16px;border-radius:12px;}
  button{margin-top:20px;background:var(--teal);color:#fff;border:none;padding:12px 26px;border-radius:30px;font-weight:600;font-size:0.95rem;cursor:pointer;}
  button:hover{opacity:0.9;}
  .adspace{margin-top:40px;padding:24px;text-align:center;border:1px dashed #ccc;border-radius:12px;color:#aaa;font-size:0.85rem;}
</style>
</head>
<body>
<header>
  <div class="logo">Krunto</div>
  <a class="back" href="index.html">← All tools</a>
</header>
<main>
  <h1>QR Code Generator</h1>
  <p class="sub">Turn any link or text into a downloadable QR code instantly.</p>

  <textarea id="text" placeholder="Type a URL, message, or text...">https://krunto.vercel.app</textarea>
  <br>
  <select id="size">
    <option value="200">Small (200px)</option>
    <option value="300" selected>Medium (300px)</option>
    <option value="500">Large (500px)</option>
  </select>

  <div class="qrbox">
    <div id="qrcode"></div>
    <button onclick="download()">Download PNG</button>
  </div>

  <div class="adspace">Ad space</div>
</main>
<script>
let qr;
function render(){
  document.getElementById('qrcode').innerHTML='';
  const size=parseInt(document.getElementById('size').value);
  qr=new QRCode(document.getElementById('qrcode'),{
    text: document.getElementById('text').value || ' ',
    width: size, height: size,
    colorDark:"#1F2321", colorLight:"#ffffff"
  });
}
function download(){
  const canvas=document.querySelector('#qrcode canvas');
  if(!canvas) return;
  const link=document.createElement('a');
  link.download='qrcode.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}
document.getElementById('text').addEventListener('input',render);
document.getElementById('size').addEventListener('change',render);
render();
</script>
</body>
</html>
