<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Free Professional PDF Invoices | Krunto</title>
<meta name="description" content="Create a professional invoice with your business details, line items, and tax, then download it as a PDF — free, no sign-up.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

<style>

:root{
  --ink:#161b22; --paper:#f7f7f5; --card:#ffffff; --line:#e3e2dd;
  --accent:#1f5f5b; --accent-dim:#e8f0ef; --accent-ink:#0f3d3a; --muted:#6b6f76; --danger:#b3402f;
}
*{box-sizing:border-box;}
body{ margin:0; font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--paper); color:var(--ink); line-height:1.5; }
header{ padding:28px 20px 20px; text-align:center; border-bottom:1px solid var(--line); background:var(--card); }
header a.home{ display:inline-block; font-size:13px; color:var(--muted); text-decoration:none; margin-bottom:10px; }
header a.home:hover{ color:var(--accent-ink); }
h1{ font-size:28px; margin:0 0 6px; letter-spacing:-0.02em; }
header p.sub{ color:var(--muted); margin:0; font-size:15px; }
main{ max-width:820px; margin:0 auto; padding:28px 20px 60px; }
.panel{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:20px; }
.row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.field{ flex:1; min-width:150px; display:flex; flex-direction:column; gap:6px; }
label{ font-size:12.5px; font-weight:600; color:var(--muted); }
input, select, textarea{ padding:10px 11px; border:1px solid var(--line); border-radius:8px; font-size:14.5px; font-family:inherit; background:#fff; width:100%; }
textarea{ resize:vertical; min-height:120px; font-family:'SFMono-Regular', Consolas, monospace; font-size:13.5px; }
button.primary{ background:var(--accent); color:#fff; border:none; padding:13px 24px; border-radius:9px; font-size:15px; font-weight:700; cursor:pointer; }
button.primary:hover{ background:var(--accent-ink); }
button.secondary{ background:none; border:1px solid var(--line); padding:13px 20px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; color:var(--muted); }
button.secondary:hover{ border-color:var(--accent); color:var(--accent-ink); }
.actions{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
.result-box{ background:var(--accent-dim); border-radius:10px; padding:18px 20px; margin-top:16px; display:none; }
.result-box.show{ display:block; }
.result-main{ font-size:26px; font-weight:700; color:var(--accent-ink); }
.result-sub{ font-size:13.5px; color:var(--muted); margin-top:4px; }
.result-list{ margin-top:10px; font-size:14px; }
.result-list div{ display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(0,0,0,.05); }
.chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.chip{ background:var(--accent-dim); color:var(--accent-ink); border:1px solid #cfe0de; padding:7px 13px; border-radius:16px; font-size:13px; cursor:pointer; font-weight:600; }
.chip:hover{ background:var(--accent); color:#fff; }
.chip.active{ background:var(--accent); color:#fff; }
table.entry-table{ width:100%; border-collapse:collapse; margin-top:6px; }
table.entry-table th{ text-align:left; font-size:12px; color:var(--muted); padding:4px 6px; }
table.entry-table td{ padding:4px 6px; }
table.entry-table input{ padding:7px 8px; font-size:13.5px; }
.small-btn{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; }
.small-btn:hover{ color:var(--danger); }
.error-text{ color:var(--danger); font-size:13.5px; margin-top:8px; }
.copy-note{ font-size:12.5px; color:var(--accent-ink); margin-left:8px; }
.ad-slot{ text-align:center; margin:26px 0; min-height:90px; }
.info-block{ margin-top:36px; }
.info-block h2{ font-size:18px; margin-bottom:8px; }
.info-block p{ color:var(--muted); font-size:14.5px; }
footer{ text-align:center; padding:24px; color:var(--muted); font-size:13px; }
footer a{ color:var(--accent-ink); }
.range-row{ display:flex; align-items:center; gap:12px; }
.range-row input[type=range]{ flex:1; }
.range-val{ font-weight:700; color:var(--accent-ink); min-width:46px; text-align:right; }
canvas{ max-width:100%; border-radius:8px; border:1px solid var(--line); }


</style>
</head>
<body>

<header>
  <a class="home" href="index.html">&larr; All Krunto tools</a>
  <h1>Invoice Generator</h1>
  <p class="sub">Fill in your details and line items, then download a clean, professional PDF invoice.</p>
</header>

<main>

  <div class="panel">
    <div class="row">
      <div class="field"><label>Your business name</label><input id="bizName" placeholder="Krunto Studio"></div>
      <div class="field"><label>Your email / phone</label><input id="bizContact" placeholder="you@business.com"></div>
    </div>
    <div class="row">
      <div class="field"><label>Bill to (client name)</label><input id="clientName" placeholder="Client Name"></div>
      <div class="field"><label>Client email / phone</label><input id="clientContact" placeholder="client@email.com"></div>
    </div>
    <div class="row">
      <div class="field"><label>Invoice number</label><input id="invoiceNo" placeholder="INV-0001"></div>
      <div class="field"><label>Invoice date</label><input type="date" id="invoiceDate"></div>
      <div class="field"><label>Tax rate (%)</label><input type="number" id="taxRate" value="0"></div>
    </div>

    <table class="entry-table" id="itemsTable">
      <thead><tr><th style="width:45%">Description</th><th>Qty</th><th>Rate</th><th></th></tr></thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <button class="secondary" id="addItemBtn" style="margin-top:8px;">+ Add line item</button>

    <div class="result-box show" style="margin-top:18px;">
      <div class="result-list">
        <div><span>Subtotal</span><span id="subtotalOut">0.00</span></div>
        <div><span>Tax</span><span id="taxOut">0.00</span></div>
        <div><span><strong>Total</strong></span><span id="totalOut"><strong>0.00</strong></span></div>
      </div>
    </div>

    <div class="actions" style="margin-top:16px;">
      <button class="primary" id="downloadBtn">Download PDF invoice</button>
    </div>
  </div>
  

  <div class="ad-slot">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

</main>

<footer>
  <a href="index.html">More free tools on Krunto</a>
</footer>

<script>

  let items = [];
  let itemId = 0;

  function addItem(){
    items.push({ id: itemId++, desc:'', qty:1, rate:0 });
    render();
  }

  function render(){
    const body = document.getElementById('itemsBody');
    body.innerHTML = '';
    items.forEach(it => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input data-f="desc" data-id="${it.id}" value="${it.desc}" placeholder="Item or service"></td>
        <td><input type="number" data-f="qty" data-id="${it.id}" value="${it.qty}" style="width:70px"></td>
        <td><input type="number" data-f="rate" data-id="${it.id}" value="${it.rate}" style="width:90px"></td>
        <td><button class="small-btn" data-remove="${it.id}">✕</button></td>
      `;
      body.appendChild(tr);
    });
    computeTotals();
  }

  document.getElementById('itemsBody').addEventListener('input', e => {
    const id = Number(e.target.dataset.id);
    const f = e.target.dataset.f;
    const item = items.find(x => x.id === id);
    if(item) item[f] = f === 'desc' ? e.target.value : parseFloat(e.target.value) || 0;
    computeTotals();
  });
  document.getElementById('itemsBody').addEventListener('click', e => {
    if(e.target.dataset.remove){
      items = items.filter(x => x.id !== Number(e.target.dataset.remove));
      render();
    }
  });

  function computeTotals(){
    const subtotal = items.reduce((s,i) => s + (i.qty * i.rate), 0);
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const tax = subtotal * (taxRate/100);
    const total = subtotal + tax;
    document.getElementById('subtotalOut').textContent = subtotal.toFixed(2);
    document.getElementById('taxOut').textContent = tax.toFixed(2);
    document.getElementById('totalOut').innerHTML = `<strong>${total.toFixed(2)}</strong>`;
  }

  document.getElementById('taxRate').addEventListener('input', computeTotals);
  document.getElementById('addItemBtn').addEventListener('click', addItem);
  document.getElementById('invoiceDate').valueAsDate = new Date();

  addItem();

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'pt', format:'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    const marginX = 50;
    let y = 60;

    doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(15,61,58);
    doc.text('INVOICE', marginX, y);
    y += 30;

    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(30,30,30);
    doc.text(document.getElementById('bizName').value || 'Your Business', marginX, y); y += 14;
    doc.text(document.getElementById('bizContact').value || '', marginX, y); y += 26;

    doc.setFont('helvetica','bold'); doc.text('Bill to:', marginX, y); y += 14;
    doc.setFont('helvetica','normal');
    doc.text(document.getElementById('clientName').value || '', marginX, y); y += 14;
    doc.text(document.getElementById('clientContact').value || '', marginX, y);

    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    doc.text(`Invoice #: ${document.getElementById('invoiceNo').value || '-'}`, pageWidth-marginX, 90, {align:'right'});
    doc.text(`Date: ${document.getElementById('invoiceDate').value || '-'}`, pageWidth-marginX, 104, {align:'right'});

    y += 40;
    doc.setDrawColor(15,61,58); doc.setLineWidth(1);
    doc.line(marginX, y, pageWidth-marginX, y); y += 18;

    doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text('Description', marginX, y);
    doc.text('Qty', marginX+300, y);
    doc.text('Rate', marginX+360, y);
    doc.text('Amount', pageWidth-marginX, y, {align:'right'});
    y += 8;
    doc.line(marginX, y, pageWidth-marginX, y); y += 16;

    doc.setFont('helvetica','normal');
    items.forEach(it => {
      const amount = (it.qty * it.rate).toFixed(2);
      doc.text(it.desc || '-', marginX, y);
      doc.text(String(it.qty), marginX+300, y);
      doc.text(it.rate.toFixed(2), marginX+360, y);
      doc.text(amount, pageWidth-marginX, y, {align:'right'});
      y += 20;
    });

    y += 10;
    doc.line(marginX+300, y, pageWidth-marginX, y); y += 18;

    const subtotal = items.reduce((s,i) => s + (i.qty*i.rate), 0);
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const tax = subtotal * (taxRate/100);
    const total = subtotal + tax;

    doc.text('Subtotal', marginX+300, y); doc.text(subtotal.toFixed(2), pageWidth-marginX, y, {align:'right'}); y += 16;
    doc.text(`Tax (${taxRate}%)`, marginX+300, y); doc.text(tax.toFixed(2), pageWidth-marginX, y, {align:'right'}); y += 16;
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('Total', marginX+300, y); doc.text(total.toFixed(2), pageWidth-marginX, y, {align:'right'});

    doc.save(`invoice-${document.getElementById('invoiceNo').value || 'draft'}.pdf`);
  });
  
</script>

</body>
</html>
