<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter & Validator — Free Online | Krunto</title>
<meta name="description" content="Format, beautify, minify, and validate JSON instantly. Free, private, and works entirely in your browser.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7143130602873663" crossorigin="anonymous"></script>

<style>

  :root{
  --ink:#161b22; --paper:#f7f7f5; --card:#ffffff; --line:#e3e2dd;
  --accent:#0d9488; --accent-dim:#e8f6f4; --accent-ink:#0b6b60; --muted:#6b6f76; --danger:#c0392b;
  }
*{box-sizing:border-box;}
body{ margin:0; font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--paper); color:var(--ink); line-height:1.5; }
header{ padding:28px 20px 20px; text-align:center; border-bottom:1px solid var(--line); background:var(--card); }
header a.home{ display:inline-block; font-size:13px; color:var(--muted); text-decoration:none; margin-bottom:10px; }
header a.home:hover{ color:var(--accent-ink); }
h1{ font-size:28px; margin:0 0 6px; letter-spacing:-0.02em; }
header p.sub{ color:var(--muted); margin:0; font-size:15px; }
main{ max-width:820px; margin:0 auto; padding:28px 20px 60px; }
.panel{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:20px; }
.row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.field{ flex:1; min-width:150px; display:flex; flex-direction:column; gap:6px; }
label{ font-size:12.5px; font-weight:600; color:var(--muted); }
input, select, textarea{ padding:10px 11px; border:1px solid var(--line); border-radius:8px; font-size:14.5px; font-family:inherit; background:#fff; width:100%; }
textarea{ resize:vertical; min-height:120px; font-family:'SFMono-Regular', Consolas, monospace; font-size:13.5px; }
button.primary{ background:var(--accent); color:#fff; border:none; padding:13px 24px; border-radius:9px; font-size:15px; font-weight:700; cursor:pointer; }
button.primary:hover{ background:var(--accent-ink); }
button.secondary{ background:none; border:1px solid var(--line); padding:13px 20px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; color:var(--muted); }
button.secondary:hover{ border-color:var(--accent); color:var(--accent-ink); }
.actions{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
.result-box{ background:var(--accent-dim); border-radius:10px; padding:18px 20px; margin-top:16px; display:none; }
.result-box.show{ display:block; }
.result-main{ font-size:26px; font-weight:700; color:var(--accent-ink); }
.result-sub{ font-size:13.5px; color:var(--muted); margin-top:4px; }
.result-list{ margin-top:10px; font-size:14px; }
.result-list div{ display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(0,0,0,.05); }
.chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.chip{ background:var(--accent-dim); color:var(--accent-ink); border:1px solid #cfe0de; padding:7px 13px; border-radius:16px; font-size:13px; cursor:pointer; font-weight:600; }
.chip:hover{ background:var(--accent); color:#fff; }
.chip.active{ background:var(--accent); color:#fff; }
table.entry-table{ width:100%; border-collapse:collapse; margin-top:6px; }
table.entry-table th{ text-align:left; font-size:12px; color:var(--muted); padding:4px 6px; }
table.entry-table td{ padding:4px 6px; }
table.entry-table input{ padding:7px 8px; font-size:13.5px; }
.small-btn{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; }
.small-btn:hover{ color:var(--danger); }
.error-text{ color:var(--danger); font-size:13.5px; margin-top:8px; }
.copy-note{ font-size:12.5px; color:var(--accent-ink); margin-left:8px; }
.ad-slot{ text-align:center; margin:26px 0; min-height:90px; }
.info-block{ margin-top:36px; }
.info-block h2{ font-size:18px; margin-bottom:8px; }
.info-block p{ color:var(--muted); font-size:14.5px; }
footer{ text-align:center; padding:24px; color:var(--muted); font-size:13px; }
footer a{ color:var(--accent-ink); }
.range-row{ display:flex; align-items:center; gap:12px; }
.range-row input[type=range]{ flex:1; }
.range-val{ font-weight:700; color:var(--accent-ink); min-width:46px; text-align:right; }
canvas{ max-width:100%; border-radius:8px; border:1px solid var(--line); }




/* --- Krunto dark shell (auto-applied) --- */
body{background:#0B0E14 !important;}
header{background:#12161F !important; border-bottom:1px solid #242A38 !important;}
header a.home{color:#8A93A6 !important;}
header a.home:hover{color:#5EEAD4 !important;}
header h1{color:#E8EAED !important;}
header p{color:#8A93A6 !important;}
footer{color:#8A93A6 !important;}
footer a{color:#5EEAD4 !important;}
.info-block h2{color:#E8EAED !important;}
.info-block p{color:#8A93A6 !important;}
.chip{border-color:#e3e2dd !important;}
</style>
</head>
<body>

<header>
  <a class="home" href="index.html">&larr; All Krunto tools</a>
  <h1>JSON Formatter</h1>
  <p class="sub">Beautify, minify, and validate JSON — with clear error messages if something's wrong.</p>
</header>

<main>

  <div class="panel">
    <textarea id="input" placeholder='Paste your JSON here, e.g. {"name":"Krunto","tools":5}' style="min-height:200px;"></textarea>
    <div class="actions" style="margin-top:12px;">
      <button class="primary" id="formatBtn">Beautify</button>
      <button class="secondary" id="minifyBtn">Minify</button>
      <button class="secondary" id="copyBtn">Copy output</button>
      <span class="copy-note" id="copyNote"></span>
    </div>
    <div class="error-text" id="errorText"></div>
    <textarea id="output" style="margin-top:14px; min-height:200px;" readonly></textarea>
  </div>
  

  <div class="ad-slot">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143130602873663" data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

</main>

<footer>
  <a href="index.html">More free tools on Krunto</a>
</footer>

<script>

  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const errorText = document.getElementById('errorText');

  function process(indent){
    errorText.textContent = '';
    try{
      const parsed = JSON.parse(input.value);
      output.value = indent === null ? JSON.stringify(parsed) : JSON.stringify(parsed, null, indent);
    } catch(e){
      errorText.textContent = 'Invalid JSON: ' + e.message;
      output.value = '';
    }
  }

  document.getElementById('formatBtn').addEventListener('click', () => process(2));
  document.getElementById('minifyBtn').addEventListener('click', () => process(null));
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(output.value).then(() => {
      const note = document.getElementById('copyNote');
      note.textContent = 'Copied!';
      setTimeout(() => note.textContent = '', 1500);
    });
  });
  
</script>

</body>
</html>
