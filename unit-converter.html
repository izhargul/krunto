<style>

  --accent:#0d9488; --accent-dim:#e8f6f4; --accent-ink:#0b6b60; --muted:#6b6f76; --danger:#c0392b;

/* --- Krunto dark shell (auto-applied) --- */
body{background:#0B0E14 !important;}
header{background:#12161F !important; border-bottom:1px solid #242A38 !important;}
header a.home{color:#8A93A6 !important;}
header a.home:hover{color:#5EEAD4 !important;}
header h1{color:#E8EAED !important;}
header p{color:#8A93A6 !important;}

</head>
<body>

<header>
  <a class="home" href="index.html">&larr; All Krunto tools</a>
  <h1>Unit Converter</h1>
  <p class="sub">Convert length, weight, and temperature between metric and imperial units.</p>
</header>

<main>

  <div class="panel">
    <div class="chip-row" id="catChips">
      <span class="chip active" data-cat="length">Length</span>
      <span class="chip" data-cat="weight">Weight</span>
      <span class="chip" data-cat="temp">Temperature</span>
    </div>

    <div class="row">
      <div class="field"><label>Value</label><input type="number" id="value" value="1"></div>
      <div class="field"><label>From</label><select id="fromUnit"></select></div>
      <div class="field"><label>To</label><select id="toUnit"></select></div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-main" id="resultMain">—</div>
    </div>
  </div>
  

  <div class="ad-slot">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143130602873663" data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

</main>

<footer>
  <a href="index.html">More free tools on Krunto</a>
</footer>

<script>

  const units = {
    length: { m:1, km:1000, cm:0.01, mm:0.001, mile:1609.34, yard:0.9144, foot:0.3048, inch:0.0254 },
    weight: { kg:1, g:0.001, mg:0.000001, tonne:1000, lb:0.453592, oz:0.0283495, stone:6.35029 }
  };
  const labels = {
    m:'Meters', km:'Kilometers', cm:'Centimeters', mm:'Millimeters', mile:'Miles', yard:'Yards', foot:'Feet', inch:'Inches',
    kg:'Kilograms', g:'Grams', mg:'Milligrams', tonne:'Tonnes', lb:'Pounds', oz:'Ounces', stone:'Stone',
    c:'Celsius', f:'Fahrenheit', k:'Kelvin'
  };
  const catChips = document.querySelectorAll('#catChips .chip');
  const fromUnit = document.getElementById('fromUnit');
  const toUnit = document.getElementById('toUnit');
  let cat = 'length';

  function populateUnits(){
    fromUnit.innerHTML = ''; toUnit.innerHTML = '';
    let keys = cat === 'temp' ? ['c','f','k'] : Object.keys(units[cat]);
    keys.forEach((k,i) => {
      const o1 = document.createElement('option'); o1.value = k; o1.textContent = labels[k];
      fromUnit.appendChild(o1);
      const o2 = o1.cloneNode(true); toUnit.appendChild(o2);
    });
    fromUnit.selectedIndex = 0;
    toUnit.selectedIndex = keys.length > 1 ? 1 : 0;
  }

  catChips.forEach(c => c.addEventListener('click', () => {
    catChips.forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    cat = c.dataset.cat;
    populateUnits();
    compute();
  }));

  function toCelsius(v, u){
    if(u==='c') return v;
    if(u==='f') return (v-32)*5/9;
    if(u==='k') return v-273.15;
  }
  function fromCelsius(v, u){
    if(u==='c') return v;
    if(u==='f') return v*9/5+32;
    if(u==='k') return v+273.15;
  }

  function compute(){
    const val = parseFloat(document.getElementById('value').value);
    const box = document.getElementById('resultBox');
    if(isNaN(val)){ box.classList.remove('show'); return; }
    let result;
    if(cat === 'temp'){
      const c = toCelsius(val, fromUnit.value);
      result = fromCelsius(c, toUnit.value);
    } else {
      const base = val * units[cat][fromUnit.value];
      result = base / units[cat][toUnit.value];
    }
    document.getElementById('resultMain').textContent = `${val} ${labels[fromUnit.value]} = ${result.toLocaleString(undefined,{maximumFractionDigits:6})} ${labels[toUnit.value]}`;
    box.classList.add('show');
  }

  document.getElementById('value').addEventListener('input', compute);
  fromUnit.addEventListener('change', compute);
  toUnit.addEventListener('change', compute);
  populateUnits();
  compute();
  
</script>

</body>
</html>
