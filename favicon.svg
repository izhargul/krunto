<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12161F"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="toast" x1="18" y1="14" x2="42" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBE3A8"/>
      <stop offset="0.55" stop-color="#F0B85B"/>
      <stop offset="1" stop-color="#C06B2C"/>
    </linearGradient>
    <linearGradient id="crust" x1="16" y1="30" x2="48" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A4A1E"/>
      <stop offset="1" stop-color="#A85D2A"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Bitten toast mark: unique to "Krunto" (a piece of bread) -->
  <g filter="url(#glow)">
    <path d="M16 54 L16 30 A17 17 0 0 1 48 30 A11 11 0 0 0 48 52 L48 54 Z" fill="url(#toast)"/>
    <!-- crust rim along the top dome -->
    <path d="M16 30 A17 17 0 0 1 48 30" fill="none" stroke="url(#crust)" stroke-width="3" stroke-linecap="round"/>
    <!-- soft highlight on the bite's inner edge -->
    <path d="M48 30 A11 11 0 0 0 48 52" fill="none" stroke="#8A4A1E" stroke-opacity="0.45" stroke-width="1.5"/>
    <!-- gentle top-left shine -->
    <ellipse cx="25" cy="26" rx="7" ry="4" fill="#ffffff" opacity="0.28"/>
  </g>
</svg>
